<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP CHAT</title>

<style>
:root {
  --bg-deep: #020617;
  --accent-cyan: #38bdf8;
  --text-main: #f8fafc;
  --card-bg: none;
}

body {
  margin:0;
  background: var(--bg-deep);
  color: var(--text-main);
  font-family: sans-serif;
}

header {
  padding:10px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--accent-cyan);
}

#chat-flow {
  padding:20px;
}

.msg-window {
  border:1px solid var(--accent-cyan);
  padding:10px;
  margin-bottom:10px;
}

.log-card {
  width:400px;
  height:200px;
  background-image: var(--card-bg);
  background-size:cover;
}
</style>
</head>

<body>

<div id="fixed-bg"></div>

<header>
  <div>
    <div id="app-title">VIP CHAT</div>
    <div id="my-uid">UID: GUEST</div>
  </div>
  <div>GUESTS: <span id="guest-count">0</span></div>
</header>

<div id="chat-flow"></div>

<img id="preview-logo" />

<script>
// ===== config =====
window.APP_CONFIG = {
  title: "VIP CHAT",
  username: "虚星 宵",
  adminName: "RYUSEI YOI",

  colors: {
    accent: "#38bdf8",
    bg: "#020617",
    text: "#f8fafc"
  },

  background: {
    morning: "morning.jpg",
    noon: "noon.jpg",
    evening: "evening.jpg",
    night: "night.jpg",
    card: "your-background-image.png"
  },

  logo: "your-logo.png"
};

// ===== apply config =====
const cfg = window.APP_CONFIG;

// タイトル
const titleEl = document.getElementById("app-title");
if (titleEl) titleEl.innerText = cfg.title;
document.title = `${cfg.title} - ${cfg.username}`;

// 色
document.documentElement.style.setProperty('--accent-cyan', cfg.colors.accent);
document.documentElement.style.setProperty('--bg-deep', cfg.colors.bg);
document.documentElement.style.setProperty('--text-main', cfg.colors.text);

// ロゴ
const logo = document.getElementById("preview-logo");
if (logo) logo.src = cfg.logo;

// カード背景
document.documentElement.style.setProperty('--card-bg', `url('${cfg.background.card}')`);

// 背景切替
function updateBG() {
  const hour = new Date().getHours();
  let img = cfg.background.night;

  if (hour >= 6 && hour < 12) img = cfg.background.morning;
  else if (hour >= 12 && hour < 17) img = cfg.background.noon;
  else if (hour >= 17 && hour < 20) img = cfg.background.evening;

  document.getElementById('fixed-bg').style.backgroundImage = `url('${img}')`;
}

updateBG();
setInterval(updateBG, 60000);

// ===== mock chat (動作確認用) =====
const flow = document.getElementById("chat-flow");
for (let i=0;i<3;i++){
  const div = document.createElement("div");
  div.className = "msg-window";
  div.innerText = "テストメッセージ " + i;
  flow.appendChild(div);
}
</script>

</body>
</html>
