<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIP CHAT - SESSION</title>
    <style>
        /* =========================================
           [CONFIG] ユーザー設定エリア
           ここを書き換えるだけでデザインをカスタマイズできます
        ========================================= */
        :root {
            --bg-deep: #020617;          /* 全体の背景色 */
            --accent-main: #38bdf8;      /* メインのアクセントカラー（シアン系） */
            --accent-sub: #fbbf24;       /* サブのアクセントカラー（ゴールド系） */
            --text-white: #f8fafc;       /* メインの文字色 */
            --window-alpha: rgba(56, 189, 248, 0.05); /* ウィンドウの透明度 */
            
            /* カード保存時のタイトル設定 */
            --card-title-normal: "【LOG】OBSERVATION";
            --card-title-admin:  "【SYSTEM】PRIORITY";
        }

        /* 共通フォント設定 */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-white);
            font-family: 'Share Tech Mono', 'Zen Kaku Gothic New', sans-serif;
            height: 100dvh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: manipulation;
        }

        /* --- UI Components --- */
        header {
            padding: calc(env(safe-area-inset-top) + 5px) 15px 5px;
            display: grid; grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); z-index: 100;
        }
        .uid-area { font-size: 10px; opacity: 0.8; cursor: pointer; }
        .counter { font-size: 12px; color: var(--accent-main); text-align: right; }

        .video-container {
            flex-shrink: 0; width: 100%; aspect-ratio: 16 / 9;
            background: #000; position: relative; z-index: 10; max-height: 50dvh;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        #chat-flow {
            flex: 1; min-height: 0; overflow-y: auto; padding: 15px 15px 80px;
            display: flex; flex-direction: column;
            mask-image: linear-gradient(to top, black 90%, transparent 100%);
        }

        .msg-window {
            position: relative; background: var(--window-alpha);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 8px 12px; margin-bottom: 10px; backdrop-filter: blur(4px);
        }

        /* --- Input Area --- */
        .input-area {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 10px 0 calc(env(safe-area-inset-bottom) + 15px);
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(8px); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            border-top: 1px solid rgba(56, 189, 248, 0.2);
        }

        #input-popup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 2000;
            justify-content: center; align-items: flex-start;
            padding-top: 100px; touch-action: none; overscroll-behavior: contain;
        }

        .popup-content {
            background: #fff; width: 85%; max-width: 300px; padding: 12px;
            border-radius: 12px; display: flex; flex-direction: column; gap: 8px;
        }

        textarea#chat-input {
            width: 100%; height: 50px; border: 1px solid #eee; padding: 8px;
            font-size: 14px; border-radius: 6px; resize: none; outline: none;
            box-sizing: border-box; color: #333; background: #fdfdfd;
        }

        #send-btn {
            width: 100%; background: var(--accent-main); color: var(--bg-deep);
            border: none; padding: 10px; border-radius: 6px; font-weight: bold;
        }

        /* --- PC Responsive --- */
        @media (min-width: 768px) {
            #input-popup {
                display: flex !important; position: fixed; top: auto; bottom: 0;
                height: auto; background: rgba(2, 6, 23, 0.95); padding-top: 0;
                border-top: 2px solid var(--accent-main);
            }
            .popup-content {
                width: 100%; max-width: 1200px; background: none; flex-direction: row; padding: 15px 30px;
            }
            .popup-content button[onclick="closePopup()"] { display: none; }
            textarea#chat-input { flex: 1; height: 44px; }
            .input-area { display: none !important; }
            #send-btn { width: 140px; height: 44px; }
            #chat-flow { padding-bottom: 100px; }
        }

        /* --- Card System (Simple) --- */
        .log-card {
            position: relative; width: 960px; height: 540px;
            background-color: var(--bg-deep); /* デフォルトは背景色のみ */
            background-size: cover; background-position: center;
            overflow: hidden; color: var(--text-white);
        }
        .info-container { position: absolute; top: 80px; left: 100px; width: 600px; z-index: 20; }
        .dist-title { font-size: 1.4rem; color: var(--accent-main); margin-bottom: 10px; }
        .comment-box { 
            padding: 25px; background: rgba(255,255,255,0.05); 
            border-left: 4px solid var(--accent-main); backdrop-filter: blur(8px);
        }
        .comment-text { font-size: 1.5rem; line-height: 1.5; }
        .timestamp { display: block; text-align: right; margin-top: 10px; opacity: 0.8; }
        .logo-area { position: absolute; bottom: 20px; left: 20px; }
        .logo-area img { height: 80px; }

        #fixed-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="fixed-bg"></div>

<header>
    <div class="header-left">
        <div id="room-name" style="font-size:14px; font-weight:bold; color:var(--accent-main);">VIP CHAT</div>
        <div class="uid-area" onclick="copyUID()" id="my-uid">UID: GUEST_MODE</div>
    </div>
    <div class="header-right">
        <div class="counter"><span>GUESTS</span><b id="guest-count">0</b></div>
    </div>
</header>

<div class="video-container">
    <iframe id="yt-player" src="" allowfullscreen></iframe>
</div>

<div id="chat-flow">
    <div id="welcome-msg" class="guide-panel">
        <p id="auth-status-msg" style="font-size:11px;">SYSTEM READY. PLEASE LOGIN.</p>
        <button id="login-trigger-btn" style="border: 1px solid var(--accent-main); padding: 5px 15px; margin-top:10px; background:none; color:#fff;">Google LOGIN</button>
    </div>
</div>

<div id="lock-overlay" style="position:fixed; bottom:60px; left:0; width:100%; font-size:11px; color:#f87171; text-align:center; z-index:1001;"></div>

<div class="input-area">
    <button id="open-popup-btn" disabled style="background: var(--accent-main); color: var(--bg-deep); border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; opacity: 0.5;">
        OFFLINE
    </button>
</div>

<div id="input-popup">
    <div class="popup-content">
        <div style="text-align: right;">
            <button onclick="closePopup()" style="background:none; border:none; font-size:24px; color:#999;">&times;</button>
        </div>
        <div style="position:relative; flex: 1;">
            <textarea id="chat-input" placeholder="メッセージを入力..." maxlength="140"></textarea>
        </div>
        <button id="send-btn">SEND</button>
    </div>
</div>

<!-- 画像保存用プレビュー -->
<div id="screenshot-preview" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:5000; justify-content:center; align-items:center; flex-direction:column; backdrop-filter: blur(10px);">
    <div id="card-capture-area" class="log-card" style="transform: scale(0.35); transform-origin: center;">
        <div class="info-container">
            <p class="dist-title" id="preview-title"></p>
            <div class="comment-box">
                <span class="comment-text" id="preview-text"></span>
            </div>
            <span class="timestamp" id="preview-time"></span>
        </div>
        <div class="logo-area">
            <img src="dummy-logo.png" id="preview-logo">
        </div>
    </div>
    <div style="margin-top: 20px; display:flex; gap:20px;">
        <button onclick="closePreview()" style="padding:12px 24px; background:#444; color:#fff; border:none; border-radius:8px;">CLOSE</button>
        <button onclick="saveCardImage()" style="padding:12px 24px; background:var(--accent-main); color:#020617; border:none; border-radius:8px; font-weight:bold;">SAVE IMAGE</button>
    </div>
</div>

<script type="module">
    /* =========================================
       [CONFIG] JavaScript 設定エリア
    ========================================= */
    const CONFIG = {
        youtubeId: "LIVE_ID_HERE",      // YouTubeのライブID
        roomName: "VIP PRIVATE CHAT",   // ヘッダーに表示する名前
        bgImage: "default-bg.jpg",      // 背景画像（おまけ用）
        cardLogo: "default-logo.png"    // カードに表示するロゴ
    };

    // 初期反映
    document.getElementById('room-name').innerText = CONFIG.roomName;
    document.getElementById('yt-player').src = `https://www.youtube.com/embed/${CONFIG.youtubeId}`;
    document.getElementById('fixed-bg').style.backgroundImage = `url('${CONFIG.bgImage}')`;
    document.getElementById('preview-logo').src = CONFIG.cardLogo;

    // Firebase 設定
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebasedatabase.app",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser = null;
    let currentNgWords = [];

    // --- 以降、ロジック部分は変更なし（整理のみ） ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('my-uid').innerText = `UID: ${user.uid}`;
            const snapshot = await get(ref(db, `whitelist/${user.uid}`));
            if (snapshot.exists() && snapshot.val() === true) {
                document.getElementById('welcome-msg').style.display = 'none';
                startApp();
            } else {
                document.getElementById('auth-status-msg').innerText = "WAITING FOR APPROVAL...";
            }
        }
    });

    function startApp() {
        onValue(ref(db, 'settings/ngWords'), (snap) => {
            const val = snap.val() || "";
            currentNgWords = val.split(',').map(word => word.trim()).filter(w => w !== "");
        });

        onValue(ref(db, 'settings/isLive'), (snap) => {
            const isLive = snap.val();
            const btn = document.getElementById('open-popup-btn');
            btn.disabled = !isLive;
            btn.style.opacity = isLive ? "1" : "0.5";
            btn.innerText = isLive ? "SEND MESSAGE" : "OFFLINE";
        });

        onValue(ref(db, 'vip_chats'), (snap) => {
            const container = document.getElementById('chat-flow');
            container.innerHTML = "";
            snap.forEach((child) => {
                const msg = child.val();
                if (msg.uid === currentUser.uid || msg.isAdmin) {
                    const div = document.createElement('div');
                    div.className = 'msg-window';
                    const text = (msg.uid === currentUser.uid) ? msg.text : (msg.filteredText || msg.text);
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <div style="font-size:13px;">${text}</div>
                            <button onclick="openCardPreview('${text.replace(/'/g, "\\'")}', ${msg.timestamp}, ${msg.isAdmin})" style="color:var(--accent-main); background:none; border:none; cursor:pointer;">📸</button>
                        </div>`;
                    container.prepend(div);
                }
            });
        });
    }

    window.sendMessage = () => {
        const input = document.getElementById('chat-input');
        if (!input.value.trim()) return;
        let cleanText = input.value;
        currentNgWords.forEach(w => { cleanText = cleanText.replace(new RegExp(w, 'gi'), '***'); });
        push(ref(db, 'vip_chats'), {
            uid: currentUser.uid,
            text: input.value,
            filteredText: cleanText,
            timestamp: serverTimestamp()
        });
        input.value = ""; window.closePopup();
    };

    document.getElementById('login-trigger-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    document.getElementById('send-btn').onclick = window.sendMessage;
    document.getElementById('open-popup-btn').onclick = () => document.getElementById('input-popup').style.display = 'flex';
    window.closePopup = () => document.getElementById('input-popup').style.display = 'none';
    window.copyUID = () => { navigator.clipboard.writeText(currentUser.uid); alert("COPIED!"); };
</script>

<script>
    window.openCardPreview = (text, timestamp, isAdmin) => {
        const date = new Date(timestamp);
        document.getElementById('preview-text').innerText = text;
        document.getElementById('preview-time').innerText = date.toLocaleString();
        document.getElementById('preview-title').innerText = isAdmin ? 
            getComputedStyle(document.documentElement).getPropertyValue('--card-title-admin').replace(/"/g,'') : 
            getComputedStyle(document.documentElement).getPropertyValue('--card-title-normal').replace(/"/g,'');
        document.getElementById('screenshot-preview').style.display = 'flex';
    };
    window.closePreview = () => document.getElementById('screenshot-preview').style.display = 'none';
    window.saveCardImage = () => {
        html2canvas(document.getElementById('card-capture-area'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `chat-log-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            closePreview();
        });
    };
</script>
</body>
</html>
