<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VIP CHAT - 虚星 宵 (HUD)</title>
    <style>
        /* 1. 基本設定 & 宇宙サイバーフォント */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #020617;
            --accent-cyan: #38bdf8;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --window-bg: rgba(56, 189, 248, 0.05);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Share Tech Mono', 'Zen Kaku Gothic New', sans-serif;
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        #fixed-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
            transition: background-image 1.5s ease;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 5px) 15px 5px;
            display: grid; grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); z-index: 100;
        }
        .uid-area { font-size: 10px; opacity: 0.8; cursor: pointer; }
        .counter { font-size: 12px; color: var(--accent-cyan); text-align: right; }

        .video-container { width: 100%; aspect-ratio: 16 / 9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        #chat-flow {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column-reverse;
            mask-image: linear-gradient(to top, black 90%, transparent 100%);
        }

        .msg-window {
            position: relative; background: var(--window-bg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 8px 12px; margin-bottom: 10px; backdrop-filter: blur(4px);
        }

        .input-area {
            padding: 10px 15px calc(env(safe-area-inset-bottom) + 10px);
            background: rgba(2, 6, 23, 0.9); border-top: 1px solid rgba(56, 189, 248, 0.2);
        }
        
        .input-box {
            display: flex; gap: 10px; background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent-cyan); border-radius: 4px; padding: 5px 10px;
        }

        input { flex: 1; background: none; border: none; color: #fff; font-size: 14px; outline: none; }
        button { background: none; border: none; color: var(--accent-cyan); font-weight: bold; cursor: pointer; }
        
        #lock-overlay { font-size: 11px; color: #f87171; text-align: center; margin-top: 5px; }

        /* 案内用パネルのスタイル */
        .guide-panel {
            text-align: center; border: 1px dashed var(--accent-cyan); padding: 20px; margin: 10px 0;
        }
    </style>
</head>
<body>

<div id="fixed-bg"></div>

<header>
    <div class="header-left">
        <div style="font-size:14px; font-weight:bold; color:var(--accent-cyan);">VIP CHAT</div>
        <div class="uid-area" onclick="copyUID()" id="my-uid">UID: GUEST_MODE</div>
    </div>
    <div class="header-right">
        <div class="counter"><span>GUESTS</span><b id="guest-count">0</b></div>
    </div>
</header>

<div class="video-container">
    <iframe src="https://www.youtube.com/embed/LIVE_ID_HERE" allowfullscreen></iframe>
</div>

<div id="chat-flow">
    <div id="welcome-msg" class="guide-panel">
        <p id="auth-status-msg" style="font-size:11px;">SYSTEM READY. PLEASE LOGIN.</p>
        <button id="login-trigger-btn" style="border: 1px solid var(--accent-cyan); padding: 5px 15px; margin-top:10px;">Google LOGIN</button>
    </div>
</div>

<div class="input-area">
    <div class="input-box">
        <input type="text" id="chat-input" placeholder="LOGIN REQUIRED..." maxlength="140" disabled>
        <button id="send-btn" disabled>SEND</button>
    </div>
    <div id="lock-overlay">認証を完了してください</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, set, get, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    // 【重要】新しいプロジェクトのConfigに書き換えてください
    const firebaseConfig = {
    databaseURL: "https://yoi-vip-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
    authDomain: "yoi-vip-chat.firebaseapp.com",
    projectId: "yoi-vip-chat",
    storageBucket: "yoi-vip-chat.firebasestorage.app",
    messagingSenderId: "751624052656",
    appId: "1:751624052656:web:780bad2d69c504e67ec075",
    measurementId: "G-G67NWSS1C1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
        const myUid = document.getElementById('my-uid');
        const authStatus = document.getElementById('auth-status-msg');
        const loginBtn = document.getElementById('login-trigger-btn');

        if (user) {
            currentUser = user;
            myUid.innerText = `UID: ${user.uid}`;
            if(loginBtn) loginBtn.style.display = 'none';

            // 1. FirebaseのWhitelistを直接チェック（管理者/VIP突破）
            const whitelistRef = ref(db, `whitelist/${user.uid}`);
            const snapshot = await get(whitelistRef);

            if (snapshot.exists() && snapshot.val() === true) {
                document.getElementById('welcome-msg').style.display = 'none';
                startApp();
            } else {
                // 2. 未登録時の案内（UIDを突きつける）
                showRegistrationGuide(user.uid);
            }
        } else {
            myUid.innerText = "UID: GUEST_MODE";
        }
    });

    function showRegistrationGuide(uid) {
        const authStatus = document.getElementById('auth-status-msg');
        authStatus.innerHTML = `
            <div style="padding:10px; border:1px dashed var(--accent-gold); background:rgba(251,191,36,0.05);">
                <p style="color:var(--accent-gold); font-weight:bold; margin:0 0 10px 0;">UNREGISTERED ID</p>
                <p style="font-size:10px; opacity:0.8;">
                    下のUIDをコピーして宵に送ってください。
                </p>
                <div onclick="copyUID()" style="background:rgba(255,255,255,0.1); padding:8px; margin:10px 0; font-family:'Share Tech Mono'; font-size:12px; color:var(--accent-cyan); cursor:pointer; word-break:break-all;">
                    ${uid}
                </div>
                <p style="font-size:9px; opacity:0.6;">タップしてコピー</p>
            </div>
        `;
    }

    function startApp() {
        // 接続人数
        const presenceRef = ref(db, 'presence/' + currentUser.uid);
        set(presenceRef, true);
        onDisconnect(presenceRef).remove();
        onValue(ref(db, 'presence'), (snap) => {
            document.getElementById('guest-count').innerText = snap.size || 0;
        });

        // 配信ステータス監視
        onValue(ref(db, 'settings/isLive'), (snap) => {
            const isLive = snap.val();
            document.getElementById('chat-input').disabled = !isLive;
            document.getElementById('send-btn').disabled = !isLive;
            document.getElementById('chat-input').placeholder = isLive ? "ACCESS LOG..." : "AWAITING COMMANDS...";
            document.getElementById('lock-overlay').innerText = isLive ? "" : "現在、配信外のためロックされています";
        });

        // チャット受信（自分と管理者のメッセージのみ）
        onValue(ref(db, 'vip_chats'), (snap) => {
            const container = document.getElementById('chat-flow');
            // 案内パネル以外を消す
            const welcome = document.getElementById('welcome-msg');
            container.innerHTML = "";
            if(welcome) container.appendChild(welcome);

            snap.forEach((child) => {
                const msg = child.val();
                if (msg.uid === currentUser.uid || msg.isAdmin) {
                    const div = document.createElement('div');
                    div.className = 'msg-window';
                    div.innerHTML = `
                        <div style="font-size:9px; opacity:0.5;">${msg.isAdmin ? 'RYUSEI YOI' : 'UID: ' + msg.uid}</div>
                        <div style="font-size:13px;">${msg.text}</div>
                    `;
                    container.appendChild(div);
                }
            });
        });
    }

    window.sendMessage = () => {
        const input = document.getElementById('chat-input');
        if (!input.value.trim()) return;
        push(ref(db, 'vip_chats'), {
            uid: currentUser.uid,
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    document.getElementById('login-trigger-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    window.copyUID = () => {
        const uid = currentUser ? currentUser.uid : "";
        if(uid) {
            navigator.clipboard.writeText(uid);
            alert("UID COPIED!");
        }
    };

    function updateBG() {
        const hour = new Date().getHours();
        let img = "night.jpg";
        if (hour >= 6 && hour < 12) img = "morning.jpg";
        else if (hour >= 12 && hour < 17) img = "noon.jpg";
        else if (hour >= 17 && hour < 20) img = "evening.jpg";
        document.getElementById('fixed-bg').style.backgroundImage = `url('${img}')`;
    }
    updateBG();
    setInterval(updateBG, 60000);
</script>
</body>
</html>
