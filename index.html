<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIP CHAT - 虚星 宵 (HUD)</title>
    <style>
        /* 1. 基本設定 & 宇宙サイバーフォント */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #020617;
            --accent-cyan: #38bdf8;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --window-bg: rgba(56, 189, 248, 0.05);
        }

        /* --- 宵さんこだわりのL字装飾 & グリッチ設定を追加 --- */
        .comment-box {
            position: relative;
            background: rgba(0, 10, 20, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 20px;
        }
        /* 四隅のL字 */
        .comment-box::before, .comment-box::after {
            content: ""; position: absolute; width: 10px; height: 10px;
            border-color: var(--accent-cyan); border-style: solid;
        }
        .comment-box::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
        .comment-box::after { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }

        .dist-title {
            position: relative;
            text-shadow: 1px 0 #00ffff, -1px 0 #b0b0b0;
            animation: glitch 4s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            0.8% { transform: translate(-2px, 0.5px); }
            1.6% { transform: translate(2px, -0.5px); }
            2.4% { transform: translate(0); }
            100% { transform: translate(0); }
        }
        /* --- ここまで追加 --- */

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Share Tech Mono', 'Zen Kaku Gothic New', sans-serif;
            height: 100dvh; 
            display: flex; flex-direction: column; 
            overflow: hidden;
            touch-action: manipulation;
        }

        .input-area {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            padding: 10px 0 calc(env(safe-area-inset-bottom) + 15px); 
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            border-top: 1px solid rgba(56, 189, 248, 0.2);
        }

        #input-popup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 2000;
            display: flex; justify-content: center; align-items: flex-start; padding-top: 100px;
            touch-action: none; overscroll-behavior: contain;
        }

        .popup-content {
            background: #fff; width: 85%; max-width: 300px; padding: 12px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 8px;
        }

        textarea#chat-input {
            width: 100%; height: 50px; border: 1px solid #eee; padding: 8px;
            font-size: 14px; border-radius: 6px; resize: none; outline: none;
            box-sizing: border-box; color: #333; background: #fdfdfd;
        }
        
        #fixed-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
            transition: background-image 1.5s ease;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 5px) 15px 5px;
            display: grid; grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); z-index: 100;
        }
        .uid-area { font-size: 10px; opacity: 0.8; cursor: pointer; }
        .counter { font-size: 12px; color: var(--accent-cyan); text-align: right; }

        .video-container { 
            flex-shrink: 0 !important; width: 100% !important; aspect-ratio: 16 / 9; 
            background: #000; position: relative; z-index: 10; max-height: 50dvh; 
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        #chat-flow {
            flex: 1; min-height: 0; overflow-y: auto; 
            padding: 15px 15px 80px; display: flex; flex-direction: column; 
            mask-image: linear-gradient(to top, black 90%, transparent 100%);
        }

        .msg-window {
            position: relative; background: var(--window-bg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 8px 12px; margin-bottom: 10px; backdrop-filter: blur(4px);
        }

        .char-counter {
            position: absolute; bottom: 5px; right: 10px;
            font-size: 10px; color: #666;
        }

        #send-btn {
            width: 100%; background: var(--accent-cyan); color: var(--bg-deep);
            border: none; padding: 10px; border-radius: 6px;
            font-weight: bold; font-size: 14px;
        }

        #lock-overlay { 
            position: fixed; bottom: 60px; left: 0; width: 100%;
            font-size: 11px; color: #f87171; text-align: center; z-index: 1001;
        }

        .guide-panel { text-align: center; border: 1px dashed var(--accent-cyan); padding: 20px; margin: 10px 0; }

        /* PC設定省略 */
        @media (min-width: 768px) {
            #input-popup { display: flex !important; position: fixed; top: auto; bottom: 0; height: auto; background: rgba(2, 6, 23, 0.95); border-top: 2px solid var(--accent-cyan); }
            .popup-content { width: 100%; max-width: 1200px; background: none; box-shadow: none; flex-direction: row; align-items: center; padding: 15px 30px; gap: 15px; margin: 0 auto; }
            .popup-content button[onclick="closePopup()"] { display: none; }
            textarea#chat-input { flex: 1; height: 44px; }
            .input-area { display: none !important; }
            #send-btn { width: 140px; height: 44px; }
            #chat-flow { padding-bottom: 100px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="fixed-bg"></div>

<header>
    <div class="header-left">
        <div style="font-size:14px; font-weight:bold; color:var(--accent-cyan);">VIP CHAT</div>
        <div class="uid-area" onclick="copyUID()" id="my-uid">UID: GUEST_MODE</div>
    </div>
    <div class="header-right">
        <div class="counter"><span>GUESTS</span><b id="guest-count">0</b></div>
    </div>
</header>

<div class="video-container">
    <iframe src="https://www.youtube.com/embed/LIVE_ID_HERE" allowfullscreen></iframe>
</div>

<div id="chat-flow">
    <div id="welcome-msg" class="guide-panel">
        <p id="auth-status-msg" style="font-size:11px;">SYSTEM READY. PLEASE LOGIN.</p>
        <button id="login-trigger-btn" style="border: 1px solid var(--accent-cyan); padding: 5px 15px; margin-top:10px; background:none; color:#fff;">Google LOGIN</button>
    </div>
</div>

<div id="lock-overlay">認証を完了してください</div>

<div class="input-area">
    <button id="open-popup-btn" disabled 
        style="background: var(--accent-cyan); color: var(--bg-deep); border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; opacity: 0.5; transition: all 0.3s;">
        OFFLINE
    </button>
</div>

<div id="input-popup">
    <div class="popup-content">
        <div style="text-align: right;">
            <button onclick="closePopup()" style="background:none; border:none; font-size:24px; color:#999; cursor:pointer;">&times;</button>
        </div>
        <div style="position:relative; flex: 1;">
            <textarea id="chat-input" placeholder="メッセージを入力..." maxlength="140" autocomplete="off"></textarea>
            <div class="char-counter"><span id="current-char">0</span>/140</div>
        </div>
        <button id="send-btn">SEND</button>
    </div>
</div>

<div id="screenshot-preview" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:5000; justify-content:center; align-items:center; flex-direction:column;">
    <div id="card-capture-area" class="comment-box" style="width:90%; max-width:400px; background:#020617; padding:30px; position:relative;">
        <div class="dist-title" id="preview-title" style="font-size:12px; color:var(--accent-cyan); margin-bottom:10px;">GUEST DATA LOG</div>
        <div class="comment-text" id="preview-text" style="font-size:16px; color:#fff; min-height:60px; line-height:1.6; word-break:break-all;"></div>
        <div class="timestamp" id="preview-time" style="font-size:10px; text-align:right; opacity:0.7; margin-top:15px;">00:00</div>
    </div>
    <div style="margin-top:25px; display:flex; gap:15px;">
        <button onclick="closePreview()" style="padding:10px 20px; background:#444; color:#fff; border:none; border-radius:5px; cursor:pointer;">キャンセル</button>
        <button onclick="saveCardImage()" style="padding:10px 20px; background:var(--accent-cyan); color:var(--bg-deep); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">画像を保存する</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, set, get, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAUmWZ9Itw_z6Dh-deOKmBQ8rLH9I2TAGY",
        authDomain: "yoi-vip-chat.firebaseapp.com",
        databaseURL: "https://yoi-vip-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoi-vip-chat",
        storageBucket: "yoi-vip-chat.firebasestorage.app",
        messagingSenderId: "751624052656",
        appId: "1:751624052656:web:780bad2d69c504e67ec075",
        measurementId: "G-G67NWSS1C1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser = null;
    let currentNgWords = [];

    onAuthStateChanged(auth, async (user) => {
        const myUid = document.getElementById('my-uid');
        if (user) {
            currentUser = user;
            myUid.innerText = `UID: ${user.uid}`;
            const loginBtn = document.getElementById('login-trigger-btn');
            if(loginBtn) loginBtn.style.display = 'none';
            const whitelistRef = ref(db, `whitelist/${user.uid}`);
            const snapshot = await get(whitelistRef);
            if (snapshot.exists() && snapshot.val() === true) {
                document.getElementById('welcome-msg').style.display = 'none';
                startApp();
            }
        }
    });

    function startApp() {
        onValue(ref(db, 'settings/ngWords'), (snap) => {
            const val = snap.val() || "";
            currentNgWords = val.split(',').map(word => word.trim()).filter(word => word !== "");
        });

        onValue(ref(db, 'settings/isLive'), (snap) => {
            const isLive = snap.val();
            const openBtn = document.getElementById('open-popup-btn');
            if (isLive === true) {
                openBtn.disabled = false; openBtn.style.opacity = "1"; openBtn.innerText = "SEND MESSAGE";
                document.getElementById('lock-overlay').innerText = "";
            } else {
                openBtn.disabled = true; openBtn.style.opacity = "0.5"; openBtn.innerText = "OFFLINE";
                document.getElementById('lock-overlay').innerText = "配信外ロック";
            }
        });

        onValue(ref(db, 'vip_chats'), (snap) => {
            const container = document.getElementById('chat-flow');
            const welcome = document.getElementById('welcome-msg');
            container.innerHTML = "";
            if(welcome) container.appendChild(welcome);

            snap.forEach((child) => {
                const msg = child.val();
                if (msg.uid === currentUser.uid || msg.isAdmin) {
                    const div = document.createElement('div');
                    div.className = 'msg-window';
                    const displayText = (msg.uid === currentUser.uid) ? msg.text : (msg.filteredText || msg.text);
                    const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--';

                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <div>
                                ${msg.isAdmin ? `<div style="font-size:9px; color:var(--accent-cyan);">RYUSEI YOI</div>` : ''}
                                <div style="font-size:13px; word-break:break-all;">${displayText}</div>
                            </div>
                            <button onclick="openCardPreview('${displayText}', '${timeStr}', ${msg.isAdmin})" 
                                    style="background:none; border:1px solid var(--accent-cyan); color:var(--accent-cyan); font-size:9px; padding:3px 8px; border-radius:4px; cursor:pointer;">
                                CARD
                            </button>
                        </div>
                    `;
                    container.prepend(div); 
                }
            });
        });
    }

    window.sendMessage = () => {
        const input = document.getElementById('chat-input');
        const rawText = input.value.trim(); 
        if (!rawText) return;
        let cleanText = rawText;
        currentNgWords.forEach(word => {
            const regex = new RegExp(word, 'gi');
            cleanText = cleanText.replace(regex, '***');
        });
        push(ref(db, 'vip_chats'), {
            uid: currentUser.uid, text: rawText, filteredText: cleanText, timestamp: serverTimestamp()
        });
        input.value = ""; window.closePopup();
    };

    document.getElementById('send-btn').onclick = window.sendMessage;
    document.getElementById('login-trigger-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
</script>

<script>
    window.openCardPreview = (text, time, isAdmin) => {
        document.getElementById('preview-text').innerText = text;
        document.getElementById('preview-time').innerText = time;
        document.getElementById('preview-title').innerText = isAdmin ? "CORE SYSTEM LOG" : "GUEST DATA LOG";
        document.getElementById('screenshot-preview').style.display = 'flex';
    };

    window.closePreview = () => {
        document.getElementById('screenshot-preview').style.display = 'none';
    };

    window.saveCardImage = () => {
        const target = document.getElementById('card-capture-area');
        html2canvas(target, {
            backgroundColor: "#020617",
            scale: 2,
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `yoi-log-${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            closePreview();
        });
    };

    window.closePopup = () => { document.getElementById('input-popup').style.display = 'none'; };
    document.getElementById('open-popup-btn').onclick = () => { document.getElementById('input-popup').style.display = 'flex'; };
</script>
</body>
</html>
