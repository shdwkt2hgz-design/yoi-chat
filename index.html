<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIP CHAT - 虚星 宵 (HUD)</title>
    <style>
        /* 1. 基本設定 & 宇宙サイバーフォント */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #020617;
            --accent-cyan: #38bdf8;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --window-bg: rgba(56, 189, 248, 0.05);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Share Tech Mono', 'Zen Kaku Gothic New', sans-serif;
            height: 100dvh; 
            display: flex; flex-direction: column; 
            overflow: hidden;
            touch-action: manipulation;
        }

/* 1. 画面下部の固定バー：ボタンを確実に中央へ */
.input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    /* calc内の+10pxを調整して、iPhoneのバーとの被りを防ぎます */
    padding: 10px 0 calc(env(safe-area-inset-bottom) + 15px); 
    background: rgba(2, 6, 23, 0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    
    display: flex;
    justify-content: center; /* これで真ん中に寄ります */
    align-items: center;
    border-top: 1px solid rgba(56, 189, 248, 0.2);
}

/* ポップアップの外枠：位置を上寄りに固定 */
#input-popup {
    display: none; 
    position: fixed;
    top: 0; 
    left: 0;
    width: 100%; 
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 2000;
    
    display: flex;
    justify-content: center;
    /* 中央ではなく、少し上（YouTube画面のあたり）に配置 */
    align-items: flex-start; 
    padding-top: 100px; /* ここで「浮く高さ」を調整。100px〜150pxが理想的です */
    
    touch-action: none;
    overscroll-behavior: contain;
}

/* ポップアップの中身：さらにスッキリ */
.popup-content {
    background: #fff;
    width: 85%;       
    max-width: 300px; 
    padding: 12px;    /* 余白を最小限にしてコンパクトに */
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    gap: 8px;
}

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: #333;
            font-weight: bold;
        }

/* 入力欄：1行〜2行程度に見える低めの高さ */
textarea#chat-input {
    width: 100%;
    height: 50px; /* 60pxから50pxへ。これで圧迫感が消えます */
    border: 1px solid #eee;
    padding: 8px;
    font-size: 14px; /* 文字サイズも少し下げてコンパクトに */
    border-radius: 6px;
    resize: none;
    outline: none;
    box-sizing: border-box;
    color: #333;
    background: #fdfdfd;
}
        
        #fixed-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
            transition: background-image 1.5s ease;
        }

        header {
            padding: calc(env(safe-area-inset-top) + 5px) 15px 5px;
            display: grid; grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); z-index: 100;
        }
        .uid-area { font-size: 10px; opacity: 0.8; cursor: pointer; }
        .counter { font-size: 12px; color: var(--accent-cyan); text-align: right; }

        .video-container { 
            flex-shrink: 0 !important;
            width: 100% !important;
            aspect-ratio: 16 / 9; 
            background: #000;
            position: relative;
            z-index: 10;
            max-height: 50dvh; 
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

#chat-flow {
    flex: 1;
    min-height: 0;
    overflow-y: auto; 
    padding: 15px 15px 80px;
    display: flex; 
    flex-direction: column; /* reverseを消して、普通の並び（上から下）にする */
    /* マスクも一度外すとデバッグしやすいです */
    mask-image: linear-gradient(to top, black 90%, transparent 100%);
}

        .msg-window {
            position: relative; background: var(--window-bg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 8px 12px; margin-bottom: 10px; backdrop-filter: blur(4px);
        }

        .char-counter {
            position: absolute; bottom: 5px; right: 10px;
            font-size: 10px; color: #666;
        }

/* 送信ボタンも少しスリムに */
#send-btn {
    width: 100%;
    background: var(--accent-cyan);
    color: var(--bg-deep);
    border: none;
    padding: 10px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 14px;
}

        #lock-overlay { 
            position: fixed; bottom: 60px; left: 0; width: 100%;
            font-size: 11px; color: #f87171; text-align: center; z-index: 1001;
        }

        .guide-panel { text-align: center; border: 1px dashed var(--accent-cyan); padding: 20px; margin: 10px 0; }

        /* PC向けのスタイル：画面幅が768px以上の場合 */
@media (min-width: 768px) {
    /* 1. ポップアップを「常に表示」状態にする */
#input-popup {
    display: flex !important; 
    position: fixed; 
    top: auto; 
    bottom: 0;
    height: auto; 
    background: rgba(2, 6, 23, 0.95);
    padding-top: 0; 
    border-top: 2px solid var(--accent-cyan);
    backdrop-filter: blur(10px);
}

    /* 2. ポップアップの中身を「横長の入力バー」に変える */
.popup-content {
    width: 100%; 
    max-width: 1200px; 
    background: none; 
    box-shadow: none;
    flex-direction: row; 
    align-items: center; 
    padding: 15px 30px; 
    gap: 15px;
    margin: 0 auto;
}

    /* 3. 閉じるボタン(&times;)はPCでは不要なので隠す */
    .popup-content button[onclick="closePopup()"] {
        display: none;
    }

    /* 4. 入力欄を横に広げる */
textarea#chat-input {
    flex: 1;
    height: 44px; 
    width: 100%;
    margin: 0;
}

    /* 5. スマホ用の「SEND MESSAGE」ボタン（丸いやつ）を隠す */
.input-area { display: none !important; }
    
    /* 6. ロック用オーバーレイの位置調整 */
    #lock-overlay {
        bottom: 80px;
    }

    .popup-content > div:nth-child(2) { 
    flex: 1; 
    display: flex;
}

    #send-btn {
    width: 140px; 
    height: 44px;
    flex-shrink: 0;
    margin: 0;
}

    #chat-flow { 
    padding-bottom: 100px; 
}
}
    
/* 「PCブラウザを細くした時」専用の設定（スマホ実機には影響しません） */
@media (hover: hover) and (pointer: fine) and (max-width: 767px) {
    #input-popup {
        /* 上に固定するのをやめて、位置を調整 */
        align-items: flex-start; 
        /* YouTubeの下あたりから表示させる。
           100pxだとYouTubeに被る場合は 150px〜200px 等で調整してください */
        padding-top: 500px; 
        padding-bottom: 0;
    }

    .popup-content {
        /* 横幅を画面いっぱいに広げ、高さも大きくする */
        width: 80%; 
        max-width: 600px; /* PCでの操作性を考えて少し上限を設ける */
        height: 20dvh;    /* 画面の高さの60%を使う */
        background: var(--bg-deep);
        border: 2px solid var(--accent-cyan);
        border-radius: 15px;
    }

    textarea#chat-input {
        /* 入力欄を縦に大きく広げる */
        flex: 1;
        height: auto;
        font-size: 16px;
    }
    
    #send-btn {
        height: 50px; /* 送信ボタンも押しやすく */
    }
}
        
    </style>
</head>
<body>

<div id="fixed-bg"></div>

<header>
    <div class="header-left">
        <div style="font-size:14px; font-weight:bold; color:var(--accent-cyan);">VIP CHAT</div>
        <div class="uid-area" onclick="copyUID()" id="my-uid">UID: GUEST_MODE</div>
    </div>
    <div class="header-right">
        <div class="counter"><span>GUESTS</span><b id="guest-count">0</b></div>
    </div>
</header>

<div class="video-container">
    <iframe src="https://www.youtube.com/embed/LIVE_ID_HERE" allowfullscreen></iframe>
</div>

<div id="chat-flow">
    <div id="welcome-msg" class="guide-panel">
        <p id="auth-status-msg" style="font-size:11px;">SYSTEM READY. PLEASE LOGIN.</p>
        <button id="login-trigger-btn" style="border: 1px solid var(--accent-cyan); padding: 5px 15px; margin-top:10px; background:none; color:#fff;">Google LOGIN</button>
    </div>
</div>

<div id="lock-overlay">認証を完了してください</div>

<div class="input-area">
    <button id="open-popup-btn" disabled 
        style="background: var(--accent-cyan); color: var(--bg-deep); border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; opacity: 0.5; transition: all 0.3s;">
        OFFLINE
    </button>
</div>

<div id="input-popup">
    <div class="popup-content">
        <div style="text-align: right;">
            <button onclick="closePopup()" style="background:none; border:none; font-size:24px; color:#999; cursor:pointer;">&times;</button>
        </div>
        
        <div style="position:relative; flex: 1;">
<textarea id="chat-input" placeholder="メッセージを入力..." maxlength="140" autocomplete="off"></textarea>
            <div class="char-counter"><span id="current-char">0</span>/140</div>
        </div>
        
        <button id="send-btn">SEND</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, set, get, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAUmWZ9Itw_z6Dh-deOKmBQ8rLH9I2TAGY",
        authDomain: "yoi-vip-chat.firebaseapp.com",
        databaseURL: "https://yoi-vip-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoi-vip-chat",
        storageBucket: "yoi-vip-chat.firebasestorage.app",
        messagingSenderId: "751624052656",
        appId: "1:751624052656:web:780bad2d69c504e67ec075",
        measurementId: "G-G67NWSS1C1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
        const myUid = document.getElementById('my-uid');
        const loginBtn = document.getElementById('login-trigger-btn');
        if (user) {
            currentUser = user;
            myUid.innerText = `UID: ${user.uid}`;
            if(loginBtn) loginBtn.style.display = 'none';
            const whitelistRef = ref(db, `whitelist/${user.uid}`);
            const snapshot = await get(whitelistRef);
            if (snapshot.exists() && snapshot.val() === true) {
                document.getElementById('welcome-msg').style.display = 'none';
                startApp();
            } else {
                showRegistrationGuide(user.uid);
            }
        } else {
            myUid.innerText = "UID: GUEST_MODE";
        }
    });

    function showRegistrationGuide(uid) {
        const authStatus = document.getElementById('auth-status-msg');
        authStatus.innerHTML = `<div style="padding:10px; border:1px dashed var(--accent-gold);"><p style="color:var(--accent-gold);">UNREGISTERED ID</p><div onclick="copyUID()" style="background:rgba(255,255,255,0.1); padding:8px; font-size:12px; cursor:pointer; word-break:break-all;">${uid}</div></div>`;
    }

    function startApp() {
        onValue(ref(db, 'presence'), (snap) => {
            document.getElementById('guest-count').innerText = snap.size || 0;
        });
        
        onValue(ref(db, 'settings/isLive'), (snap) => {
            const isLive = snap.val();
            const openBtn = document.getElementById('open-popup-btn');
            if (isLive === true) {
                openBtn.disabled = false;
                openBtn.style.opacity = "1";
                openBtn.innerText = "SEND MESSAGE";
                document.getElementById('lock-overlay').innerText = "";
            } else {
                openBtn.disabled = true;
                openBtn.style.opacity = "0.5";
                openBtn.innerText = "OFFLINE";
                document.getElementById('lock-overlay').innerText = "現在、配信外のためロックされています";
                window.closePopup();
            }
        });
        
        onValue(ref(db, 'vip_chats'), (snap) => {
            const container = document.getElementById('chat-flow');
            const welcome = document.getElementById('welcome-msg');
            container.innerHTML = "";
            if(welcome) container.appendChild(welcome);

// 【修正箇所】表示ロジック
snap.forEach((child) => {
    const msg = child.val();
    if (msg.uid === currentUser.uid || msg.isAdmin) {
        const div = document.createElement('div');
        div.className = 'msg-window';
        
        // 自分のメッセージなら「生のtext」、運営（宵さん）なら「filteredText」を表示
        const displayText = (msg.uid === currentUser.uid) ? msg.text : (msg.filteredText || msg.text);

        div.innerHTML = `
            ${msg.isAdmin ? `<div style="font-size:9px; opacity:0.8; color:var(--accent-cyan);">RYUSEI YOI</div>` : ''}
            <div style="font-size:13px; word-break:break-all;">${displayText}</div>
        `;
        container.prepend(div); 
    }
});
// snap.forEach のループが終わった直後
// setTimeout を使うことで、ブラウザが描画を終えた瞬間にスクロールさせます
setTimeout(() => {
    container.scrollTop = 0;
}, 10);
            }); // ← ここで vip_chats の onValue を閉じる
    } // ← ここで startApp 関数を閉じる

// 【このひとかたまりを丸ごと書き換え】
window.sendMessage = () => {
    const input = document.getElementById('chat-input');
    const rawText = input.value.trim(); 
    if (!rawText) return;

    // 伏字ロジック
    let cleanText = rawText;
    const ngWords = ["NGワード1", "住所", "本名"]; // NGワードリスト
    ngWords.forEach(word => {
        cleanText = cleanText.replace(word, '***');
    });

    // Firebaseへ「text」と「filteredText」の両方を送る
    push(ref(db, 'vip_chats'), {
        uid: currentUser.uid,
        text: rawText,            // 管理画面で見る「生データ」
        filteredText: cleanText,  // 配信オーバーレイや一般チャットで出す「伏字データ」
        timestamp: serverTimestamp()
    });
    
    input.value = "";
    window.closePopup();
};

    document.getElementById('login-trigger-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    document.getElementById('send-btn').onclick = window.sendMessage;
    
    window.copyUID = () => {
        const uid = currentUser ? currentUser.uid : "";
        if(uid) { navigator.clipboard.writeText(uid); alert("UID COPIED!"); }
    };

    document.getElementById('open-popup-btn').onclick = (e) => {
        if (e) e.preventDefault();
        const btn = document.getElementById('open-popup-btn');
        if (btn.disabled || btn.innerText === "OFFLINE") return false;
        document.getElementById('input-popup').style.display = 'flex';
        const input = document.getElementById('chat-input');
        if (input) input.focus({ preventScroll: true });
    };

    const chatInput = document.getElementById('chat-input');
    const charDisplay = document.getElementById('current-char');
    chatInput.addEventListener('input', () => {
        const len = chatInput.value.length;
        charDisplay.innerText = len;
        charDisplay.style.color = len >= 130 ? "#f87171" : "#666";
    });

    window.closePopup = () => {
        document.getElementById('input-popup').style.display = 'none';
    };

    function updateBG() {
        const hour = new Date().getHours();
        let img = "night.jpg";
        if (hour >= 6 && hour < 12) img = "morning.jpg";
        else if (hour >= 12 && hour < 17) img = "noon.jpg";
        else if (hour >= 17 && hour < 20) img = "evening.jpg";
        document.getElementById('fixed-bg').style.backgroundImage = `url('${img}')`;
    }
    updateBG();
    setInterval(updateBG, 60000);
    window.closePopup();
</script>
</body>
</html>
