<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ADMIN HUD - 虚星 宵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #020617;
            --accent-cyan: #38bdf8;
            --accent-red: #f87171;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-main);
            font-family: 'Share Tech Mono', sans-serif; display: flex; flex-direction: column; height: 100dvh;
        }

        /* 1. 管理ヘッダー */
        header {
            padding: 10px 20px; border-bottom: 2px solid var(--accent-cyan);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(56, 189, 248, 0.1);
        }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .live-on { background: var(--accent-cyan); color: var(--bg-deep); font-weight: bold; }
        .live-off { background: #334155; color: #94a3b8; }

        /* 2. コントロールパネル */
        .controls { padding: 15px; display: flex; gap: 10px; background: #0f172a; }
        button { 
            padding: 10px; cursor: pointer; border: 1px solid var(--accent-cyan); 
            background: none; color: var(--accent-cyan); font-family: 'Share Tech Mono';
        }
        button.active { background: var(--accent-cyan); color: var(--bg-deep); }

        /* 3. 全ユーザー監視チャット */
        #admin-chat-flow {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column;
        }

        .msg-box {
            border: 1px solid rgba(255,255,255,0.1); padding: 8px; margin-bottom: 8px;
            position: relative; transition: 0.3s;
        }
        .msg-box:hover { border-color: var(--accent-cyan); }
        .msg-info { font-size: 10px; color: var(--accent-cyan); margin-bottom: 4px; display: flex; justify-content: space-between; }
        .msg-text { font-size: 14px; word-break: break-all; }

        /* 操作ボタン */
        .msg-actions { margin-top: 8px; display: flex; gap: 5px; }
        .action-btn { font-size: 9px; padding: 2px 5px; border: 1px solid #444; color: #888; cursor: pointer; }
        .action-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
        .ban-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

    </style>
</head>
<body>

<header>
    <div>ADMIN HUD <span id="live-status-badge" class="status-badge live-off">STANDBY</span></div>
    <div id="admin-uid" style="font-size: 10px; opacity: 0.5;">AUTH CHECKING...</div>
</header>

<div class="controls">
    <button id="toggle-live-btn">配信開始 (チャット解禁)</button>
    <button onclick="clearAllLogs()" style="border-color: var(--accent-red); color: var(--accent-red);">全ログ削除 (配信終了時)</button>
</div>

<div id="admin-chat-flow">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    // 【重要】チャットページと同じ「新プロジェクト」のConfigに差し替え
    const firebaseConfig = {
        apiKey: "AIzaSyAUmWZ9Itw_z6Dh-deOKmBQ8rLH9I2TAGY",
        authDomain: "yoi-vip-chat.firebaseapp.com",
        databaseURL: "https://yoi-vip-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoi-vip-chat",
        storageBucket: "yoi-vip-chat.firebasestorage.app",
        messagingSenderId: "751624052656",
        appId: "1:751624052656:web:780bad2d69c504e67ec075",
        measurementId: "G-G67NWSS1C1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;

    // 認証チェック
    onAuthStateChanged(auth, (user) => {
        if (user && user.uid === "hdFzekIG1JSiNjbEcBdy2z3rXPx1") { // 宵さんのUID
            currentUser = user;
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('login-overlay').style.display = 'none';
            initAdmin();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    function initAdmin() {
        // 1. 配信スイッチの同期
        const liveRef = ref(db, 'settings/isLive');
        onValue(liveRef, (snap) => {
            const isLive = snap.val();
            const btn = document.getElementById('live-toggle-btn');
            btn.innerText = isLive ? "LIVE NOW (ON)" : "OFFLINE (OFF)";
            btn.style.background = isLive ? "#ef4444" : "#1e293b";
        });

        // 2. 全チャットの監視（管理者のみ全部見える）
        onValue(ref(db, 'vip_chats'), (snap) => {
            const list = document.getElementById('admin-chat-list');
            list.innerHTML = "";
            snap.forEach((child) => {
                const msg = child.val();
                const div = document.createElement('div');
                div.className = 'admin-msg';
                div.innerHTML = `
                    <small>${msg.uid}</small>
                    <p>${msg.text}</p>
                `;
                list.appendChild(div);
            });
        });
    }

    // 配信スイッチ切り替え
    window.toggleLive = () => {
        const btn = document.getElementById('live-toggle-btn');
        const nextState = btn.innerText.includes("OFFLINE");
        set(ref(db, 'settings/isLive'), nextState);
    };

    // チャット全削除
    window.clearChats = () => {
        if(confirm("全てのチャット履歴を消去しますか？")) {
            remove(ref(db, 'vip_chats'));
        }
    };

    // 宵さんとしてメッセージを送る
    window.sendAdminMsg = () => {
        const text = prompt("宵としてメッセージを送信:");
        if(!text) return;
        push(ref(db, 'vip_chats'), {
            uid: "RYUSEI_YOI",
            text: text,
            isAdmin: true,
            timestamp: serverTimestamp()
        });
    };

    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
</script>
</body>
</html>
