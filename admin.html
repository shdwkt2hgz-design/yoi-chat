<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ADMIN HUD - 虚星 宵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #020617;
            --accent-cyan: #38bdf8;
            --accent-red: #f87171;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-main);
            font-family: 'Share Tech Mono', 'Zen Kaku Gothic New', sans-serif; 
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
        }

        /* ログインオーバーレイ */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        header {
            padding: 10px 20px; border-bottom: 2px solid var(--accent-cyan);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(56, 189, 248, 0.1);
        }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .live-on { background: var(--accent-red); color: white; }
        .live-off { background: #334155; color: #94a3b8; }

        .controls { padding: 15px; display: flex; gap: 10px; background: #0f172a; border-bottom: 1px solid #334155; }
        button { 
            padding: 10px; cursor: pointer; border: 1px solid var(--accent-cyan); 
            background: none; color: var(--accent-cyan); font-family: 'Share Tech Mono';
            transition: 0.2s;
        }
        button:hover { background: rgba(56, 189, 248, 0.1); }
        
        #admin-chat-flow {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column;
        }

        .msg-box {
            border: 1px solid rgba(56, 189, 248, 0.2); padding: 10px; margin-bottom: 10px;
            background: rgba(56, 189, 248, 0.05);
        }
        .msg-info { font-size: 10px; color: var(--accent-cyan); margin-bottom: 5px; }
        .msg-text { font-size: 14px; color: #fff; line-height: 1.5; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2 style="color:var(--accent-cyan);">ADMIN AUTHENTICATION</h2>
    <button id="login-btn" style="padding: 15px 40px; font-size: 18px;">Google LOGIN</button>
</div>

<header>
    <div>ADMIN HUD <span id="live-status-badge" class="status-badge live-off">STANDBY</span></div>
    <div id="admin-uid" style="font-size: 10px; opacity: 0.5;">UID: FETCHING...</div>
</header>

<div class="controls">
    <button id="toggle-live-btn" onclick="toggleLive()">配信開始 (チャット解禁)</button>
    <button onclick="sendAdminMsg()">宵として発言</button>
    <button onclick="clearAllLogs()" style="border-color: var(--accent-red); color: var(--accent-red); margin-left: auto;">全ログ削除</button>
</div>

<div id="admin-chat-flow"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAUmWZ9Itw_z6Dh-deOKmBQ8rLH9I2TAGY",
        authDomain: "yoi-vip-chat.firebaseapp.com",
        databaseURL: "https://yoi-vip-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yoi-vip-chat",
        storageBucket: "yoi-vip-chat.firebasestorage.app",
        messagingSenderId: "751624052656",
        appId: "1:751624052656:web:780bad2d69c504e67ec075",
        measurementId: "G-G67NWSS1C1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

        // --- 1. 伏せ字の準備 ---
const maskWords = ["NGワード1", "住所", "本名"]; // 配信に出したくないワードをここに入れる

function applyMask(text) {
    if (!text) return "";
    let masked = text;
    maskWords.forEach(word => {
        const reg = new RegExp(word, 'g');
        masked = masked.replace(reg, '＊＊＊');
    });
    return masked;
}

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        const overlay = document.getElementById('login-overlay');
        const uidDisplay = document.getElementById('admin-uid');

        if (user && user.uid === "hdFzekIG1JSiNjbEcBdy2z3rXPx1") {
            currentUser = user;
            overlay.style.display = 'none';
            uidDisplay.innerText = `ADMIN: ${user.uid}`;
            initAdmin();
        } else {
            overlay.style.display = 'flex';
            if(user) alert("管理者権限がありません");
        }
    });

    function initAdmin() {
        // 1. 配信ステータス監視
        onValue(ref(db, 'settings/isLive'), (snap) => {
            const isLive = snap.val();
            const btn = document.getElementById('toggle-live-btn');
            const badge = document.getElementById('live-status-badge');
            
            btn.innerText = isLive ? "配信終了 (ロック)" : "配信開始 (解禁)";
            badge.innerText = isLive ? "BROADCASTING" : "STANDBY";
            badge.className = `status-badge ${isLive ? 'live-on' : 'live-off'}`;
        });

// 2. 全チャット監視 (ここを書き換え)
onValue(ref(db, 'vip_chats'), (snap) => {
    const container = document.getElementById('admin-chat-flow');
    container.innerHTML = "";
    snap.forEach((child) => {
        const msg = child.val();
        const msgId = child.key; // 後のPUSH機能で使うので取得しておく
        
        const masked = applyMask(msg.text); // 伏せ字を適用

        const div = document.createElement('div');
        div.className = 'msg-box';
        div.innerHTML = `
            <div class="msg-info">UID: ${msg.uid}</div>
            <div class="msg-text">${masked}</div>
            ${masked !== msg.text ? `<div style="font-size:10px; color:#64748b; margin-top:5px; border-top:1px solid #334155;">Original: ${msg.text}</div>` : ''}
            <div style="margin-top:10px;">
                <button onclick="pushToOverlay('${msgId}', '${msg.text.replace(/'/g, "\\'")}')" style="font-size:10px; padding:2px 8px;">PUSH (配信画面へ)</button>
            </div>
        `;
        container.prepend(div);
    });
});
    }

    // グローバル関数（ボタン用）
    window.toggleLive = () => {
        const badge = document.getElementById('live-status-badge');
        const isLiveNow = badge.innerText === "BROADCASTING";
        set(ref(db, 'settings/isLive'), !isLiveNow);
    };

    window.sendAdminMsg = () => {
        const text = prompt("宵として送信するメッセージ:");
        if(!text) return;
        push(ref(db, 'vip_chats'), {
            uid: "RYUSEI_YOI",
            text: text,
            isAdmin: true,
            timestamp: serverTimestamp()
        });
    };

    // --- 3. 配信画面へ射出する関数 ---
window.pushToOverlay = (id, text) => {
    // 配信画面へ送る際も、念のため伏せ字を適用して送る
    set(ref(db, 'settings/pickup'), {
        msgId: id,
        text: applyMask(text),
        timestamp: serverTimestamp()
    }).then(() => {
        console.log("PICKUP SUCCESS");
    });
};

    window.clearAllLogs = () => {
        if(confirm("全ログを削除します。よろしいですか？")) {
            remove(ref(db, 'vip_chats'))
                .then(() => alert("削除しました"))
                .catch(e => alert("エラー: " + e.message));
        }
    };

    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    
</script>
</body>
</html>
