<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VIP CHAT - 虚星 宵 (HUD)</title>
    <style>
        /* 1. 基本設定 & 宇宙サイバーフォント */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');
        
        :root {
            --bg-deep: #020617;
            --accent-cyan: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f8fafc;
            --window-bg: rgba(56, 189, 248, 0.05);
            --header-height: 40px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Share Tech Mono', 'Zen Kaku Gothic New', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 背景画像（時間連動） */
        #fixed-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
            background-repeat: no-repeat; transition: background-image 1.5s ease;
        }

        /* 2. ヘッダー (VIP CHAT / UID / GUESTS) */
        header {
            padding: calc(env(safe-area-inset-top) + 5px) 15px 5px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .header-left { display: flex; flex-direction: column; }
        .header-right { display: flex; align-items: flex-start; justify-content: flex-end; }

        .title { font-size: 14px; font-weight: bold; letter-spacing: 2px; color: var(--accent-cyan); }
        
        .uid-area {
            font-size: 10px; opacity: 0.8; margin-top: 2px;
            cursor: pointer; display: inline-block;
        }
        .uid-area:active { color: var(--accent-cyan); }

        .counter { font-size: 12px; color: var(--accent-cyan); }
        .counter span { font-size: 10px; opacity: 0.6; margin-right: 4px; }

        /* 3. YouTube 埋め込みエリア */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* 4. チャット表示エリア (自分専用) */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column-reverse; /* 下から上に流れる */
            mask-image: linear-gradient(to top, black 90%, transparent 100%);
        }

        .msg-window {
            position: relative; background: var(--window-bg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 8px 12px; margin-bottom: 10px;
            backdrop-filter: blur(4px);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-window::before { content: ""; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 2px solid var(--accent-cyan); border-left: 2px solid var(--accent-cyan); }
        .msg-window::after { content: ""; position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-bottom: 2px solid var(--accent-cyan); border-right: 2px solid var(--accent-cyan); }

        .msg-uid { font-size: 9px; opacity: 0.5; margin-bottom: 2px; }
        .msg-text { font-size: 13px; line-height: 1.4; word-break: break-all; }

        /* 5. 入力エリア */
        .input-area {
            padding: 10px 15px calc(env(safe-area-inset-bottom) + 10px);
            background: rgba(2, 6, 23, 0.9);
            border-top: 1px solid rgba(56, 189, 248, 0.2);
        }
        
        .input-box {
            display: flex; gap: 10px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent-cyan);
            border-radius: 4px;
            padding: 5px 10px;
        }

        input {
            flex: 1; background: none; border: none; color: #fff;
            font-size: 14px; outline: none; padding: 8px 0;
        }
        button {
            background: none; border: none; color: var(--accent-cyan);
            font-weight: bold; cursor: pointer; font-family: 'Share Tech Mono';
        }
        
        /* 配信外ロック表示 */
        #lock-overlay {
            font-size: 11px; color: #f87171; text-align: center; margin-top: 5px;
        }

        /* 認証前の表示 */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg-deep);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div id="fixed-bg"></div>

<div id="auth-overlay">
    <div style="font-family:'Share Tech Mono'; color:var(--accent-cyan); letter-spacing:4px; margin-bottom:20px;">ACCESS RESTRICTED</div>
    <button id="login-btn" style="border: 1px solid var(--accent-cyan); padding: 10px 20px;">Google LOGIN</button>
    <p id="auth-status" style="font-size:10px; margin-top:15px; opacity:0.6;">認証が必要です</p>
</div>

<header>
    <div class="header-left">
        <div class="title">VIP CHAT</div>
        <div class="uid-area" onclick="copyUID()" id="my-uid">UID: FETCHING...</div>
    </div>
    <div class="header-right">
        <div class="counter"><span>GUESTS</span><b id="guest-count">0</b></div>
    </div>
</header>

<div class="video-container">
    <iframe src="https://www.youtube.com/embed/LIVE_ID_HERE" allowfullscreen></iframe>
</div>

<div id="chat-flow">
    </div>

<div class="input-area">
    <div class="input-box" id="input-container">
        <input type="text" id="chat-input" placeholder="ACCESS LOG..." maxlength="140" disabled>
        <button id="send-btn" disabled>SEND</button>
    </div>
    <div id="lock-overlay">現在、配信外のためロックされています</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    // Firebase設定（Log Viewerのものを流用）
    const firebaseConfig = {
        databaseURL: "https://yoi-log-default-rtdb.firebaseio.com", 
        apiKey: "AIzaSyBgUBe80kRzgyqbmQgWQaP070RzfWw3NDQ",
        authDomain: "yoi-log.firebaseapp.com",
        projectId: "yoi-log"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;

    // 1. 認証とGAS連携
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('my-uid').innerText = `UID: ${user.uid}`;
            checkGASPermission(user.uid);
        }
    });

    async function checkGASPermission(uid) {
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwS9BgPJCLvLMHZ-w_JM7yMViLvoZabxqTWOWVjKnOuBK6h1E-J_I4FDT0lpD1yBY3K/exec";
        try {
            const res = await fetch(`${GAS_URL}?uid=${uid}`);
            const data = await res.json();
            if (data.allowed) {
                document.getElementById('auth-overlay').style.display = 'none';
                startApp();
            } else {
                document.getElementById('auth-status').innerText = "Ci-en連携が確認できません";
            }
        } catch (e) {
            document.getElementById('auth-status').innerText = "認証サーバーエラー";
        }
    }

    // 2. メインロジック
    function startApp() {
        // カウンター（接続人数）
        const presenceRef = ref(db, 'presence/' + currentUser.uid);
        set(presenceRef, true);
        onDisconnect(presenceRef).remove();
        onValue(ref(db, 'presence'), (snap) => {
            document.getElementById('guest-count').innerText = snap.size || 0;
        });

        // 配信ステータス（管理側で切り替え）
        onValue(ref(db, 'settings/isLive'), (snap) => {
            const isLive = snap.val();
            document.getElementById('chat-input').disabled = !isLive;
            document.getElementById('send-btn').disabled = !isLive;
            document.getElementById('lock-overlay').style.display = isLive ? 'none' : 'block';
        });

        // チャット受信（自分だけのログ）
        onValue(ref(db, 'vip_chats'), (snap) => {
            const container = document.getElementById('chat-flow');
            container.innerHTML = "";
            snap.forEach((child) => {
                const msg = child.val();
                // ★裏ルール：自分のUIDか、管理者(宵さん)からのメッセージのみ表示
                if (msg.uid === currentUser.uid || msg.isAdmin) {
                    const div = document.createElement('div');
                    div.className = 'msg-window';
                    div.innerHTML = `
                        <div class="msg-uid">${msg.isAdmin ? 'RYUSEI YOI' : 'UID: ' + msg.uid}</div>
                        <div class="msg-text">${msg.text}</div>
                    `;
                    container.appendChild(div);
                }
            });
        });
    }

    // 3. 送信処理
    window.sendMessage = () => {
        const input = document.getElementById('chat-input');
        if (!input.value.trim()) return;

        push(ref(db, 'vip_chats'), {
            uid: currentUser.uid,
            text: input.value,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

    // 4. 背景更新
    function updateBG() {
        const hour = new Date().getHours();
        let img = "night.jpg";
        if (hour >= 6 && hour < 12) img = "morning.jpg";
        else if (hour >= 12 && hour < 17) img = "noon.jpg";
        else if (hour >= 17 && hour < 20) img = "evening.jpg";
        document.getElementById('fixed-bg').style.backgroundImage = `url('${img}')`;
    }
    updateBG();
    setInterval(updateBG, 60000);

    // UIDコピー
    window.copyUID = () => {
        navigator.clipboard.writeText(currentUser.uid);
        alert("UID COPIED!");
    };
</script>
</body>
</html>
